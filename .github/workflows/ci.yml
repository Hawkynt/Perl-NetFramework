name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # release.yml calls this via `uses: ./.github/workflows/ci.yml`
  # so releases run the exact same matrix as per-PR CI.
  workflow_call: {}

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Perl ${{ matrix.perl-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # explicit rows because the platforms have different floors:
        # Linux builds reach back to 5.8, Strawberry on Windows starts at 5.14
        include:
          - { os: ubuntu-latest,  perl-version: '5.8'  }   # minimum supported version
          - { os: ubuntu-latest,  perl-version: '5.10' }
          - { os: ubuntu-latest,  perl-version: '5.14' }
          - { os: ubuntu-latest,  perl-version: '5.22' }
          - { os: ubuntu-latest,  perl-version: '5.30' }
          - { os: ubuntu-latest,  perl-version: '5.36' }
          - { os: windows-latest, perl-version: '5.14' }   # Strawberry floor
          - { os: windows-latest, perl-version: '5.36' }

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0                          # version.pl needs full history

    - name: Setup Perl
      uses: shogo82148/actions-setup-perl@v1
      with:
        perl-version: ${{ matrix.perl-version }}
        install-modules-with: cpanm
        install-modules: |
          Test::More
          Term::ANSIColor

    - name: Install optional dependencies (advisory)
      shell: bash
      run: |
        cpanm --notest Tk || echo "Tk installation failed, skipping GUI tests"
        cpanm --notest Image::Xbm || echo "Image::Xbm installation failed, continuing"

    # REQUIRED tier: the core modules must compile.
    - name: Build (syntax check core modules)
      shell: bash
      run: |
        perl -I. -c CSharp.pm
        perl -I. -c Filter/CSharp.pm
        perl -I. -c System.pm

    # REQUIRED tier: the C# filter is the heart of this repo - its tests must pass.
    - name: Test (core)
      shell: bash
      run: |
        perl -I. tests/System/Types.pl
        perl -I. tests/Filter/CSharp_Working.pl
        perl -I. tests/Filter/CSharp_Foreach.pl
        perl -I. tests/Filter/CSharp_Comprehensive.pl
        perl -I. tests/Filter/CSharp_LineNumbers.pl
        perl -I. tests/Filter/CSharp_Constructor.pl

    # ADVISORY tier: full per-file suite. Known-red files exist (tracked backlog),
    # so a failure here never blocks a merge - but hangs do fail it fast.
    - name: Test (full suite, advisory)
      continue-on-error: true
      shell: bash
      run: |
        cd tests
        FAILED=0
        for test_file in System/*.pl System/*/*.pl Filter/*.pl; do
          if [ -f "$test_file" ]; then
            echo "Running: $test_file"
            timeout 120 perl -I.. "$test_file" 2>&1 || { echo "::warning::$test_file failed, timed out or had issues"; FAILED=$((FAILED+1)); }
          fi
        done
        echo "Files with issues: $FAILED"
        exit $([ "$FAILED" -eq 0 ] && echo 0 || echo 1)

    # ADVISORY tier: test-methodology runner (compilation + coverage report).
    - name: Test (methodology runner, advisory)
      continue-on-error: true
      shell: bash
      run: timeout 1200 perl tests/TestRunner.pl

  lint:
    name: Perl Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Setup Perl
      uses: shogo82148/actions-setup-perl@v1
      with:
        perl-version: '5.36'
        install-modules-with: cpanm
        install-modules: |
          Perl::Critic
          Perl::Tidy

    - name: Run Perl::Critic (advisory)
      continue-on-error: true
      run: |
        find . -name "*.pm" -not -path "./tests/*" | xargs perlcritic --severity 4 --verbose 1 || echo "Perl::Critic warnings found"

    - name: Check Perl syntax (advisory)
      continue-on-error: true
      run: |
        echo "Running comprehensive syntax check..."
        find . -name "*.pm" -not -path "./tests/*" | while read -r file; do
          echo "Checking: $file"
          perl -I. -c "$file" || echo "Syntax error in: $file"
        done
        echo "Syntax check completed"
